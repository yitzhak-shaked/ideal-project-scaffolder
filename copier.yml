_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_min_copier_version: "9.0.0"

# Tasks run with cwd = destination, so the hook reads cwd directly вҖ” no need
# to pass dst_path (which is rendered as the user's relative CLI arg and
# would be wrong from inside the destination).
_tasks:
  - ["python", "{{ _copier_conf.src_path }}/_hooks/post_generation.py", "{{ ai_agent }}", "{{ agent_file_style }}"]

# Printed to the terminal before the first prompt. ANSI escape codes are
# embedded directly (Copier prints messages as plain text without Rich
# markup processing). Palette: 34=blue, 96=bright cyan, 97=white, 95=hot
# magenta, 93=gold, 90=gray, 32=green, 36=cyan, 1=bold, 0=reset.
_message_before_copy: "\x1b[34mв•ӯв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв•®\x1b[0m\n\x1b[34mв”ғ\x1b[0m  \x1b[96mв–Ҳв–Җв–Җ в–Ҳв–„в–Ҳ\x1b[0m   \x1b[97mM Y  I D E A L  P R O J E C T  T E M P L A T E\x1b[0m  \x1b[34mв”ғ\x1b[0m\n\x1b[34mв”ғ\x1b[0m  \x1b[96mв–„в–Ҳв–Ҳ в–‘в–Ҳв–‘\x1b[0m   \x1b[95mв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\x1b[0m  \x1b[34mв”ғ\x1b[0m\n\x1b[34mв”ғ\x1b[0m            \x1b[93mв—Ү\x1b[0m \x1b[90mINITIALIZING BUILD SEQUENCE\x1b[0m                   \x1b[34mв”ғ\x1b[0m\n\x1b[34mв•°в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв•Ҝ\x1b[0m\n \x1b[96m>\x1b[0m \x1b[97mAwaiting configuration...\x1b[0m\n"

_message_after_copy: "\x1b[32mвң“ {{ project_name }}\x1b[0m generated in \x1b[36m{{ _copier_conf.dst_path }}\x1b[0m\n\nNext steps:\n  1. \x1b[97mcd {{ _copier_conf.dst_path }}\x1b[0m\n  2. Review \x1b[36m{{ 'CLAUDE.md' if ai_agent == 'claude' and agent_file_style == 'canonical' else 'AGENTS.md' }}\x1b[0m and fill in the BOOTSTRAP block.\n  3. Skim \x1b[36m{{ ai_folder }}/instructions/\x1b[0m and adapt to your conventions.\n{%- if mcp_servers %}\n  4. \x1b[1mSet up MCP servers\x1b[0m:\n      - copy \x1b[36m.env.example\x1b[0m to \x1b[36m.env\x1b[0m and fill in the required tokens\n      - run \x1b[97mjust mcp\x1b[0m to verify everything is wired up\n\nSelected MCP servers: \x1b[93m{{ mcp_servers | join(', ') }}\x1b[0m\n{%- endif %}\n"

project_name:
  type: str
  help: "Project name (used in README, manifests, etc.)"
  # Defaults to the destination directory's name so the answer matches the
  # folder you generated into. Override at the prompt if you want different.
  default: "{{ _copier_conf.dst_path.name }}"
  validator: "{% if not project_name %}Required.{% endif %}"

project_description:
  type: str
  help: "One-line description of the project"
  default: ""

author_name:
  type: str
  help: "Author / maintainer name"
  default: ""

author_email:
  type: str
  help: "Author / maintainer email"
  default: ""

languages:
  type: str
  multiselect: true
  help: "Which languages? (SPACE to toggle each, ENTER to confirm)"
  choices:
    Rust: rust
    Python: python
    "C/C++": cpp
    TypeScript/Node: typescript
  default: []

domain:
  type: str
  help: "Primary deployment target / use-case (choose one)"
  choices:
    Web service or app: web
    CLI utility: cli
    Embedded / hardware: embedded
    Library / SDK: library

ai_agent:
  type: str
  help: "Primary AI assistant for this project"
  choices:
    Claude Code: claude
    Cursor: cursor
    GitHub Copilot: copilot
    Universal (any agent): universal
  default: claude

agent_file_style:
  type: str
  help: "How should agent instruction files be named?"
  choices:
    "Per-agent canonical (CLAUDE.md / .cursorrules / copilot-instructions.md)": canonical
    "Generic AGENTS.md as source of truth, agent-specific files redirect to it": generic
  default: canonical

mcp_servers:
  type: str
  multiselect: true
  help: "Which MCP servers? (SPACE to toggle each, ENTER to confirm)"
  choices:
    "GitHub (issues, PRs, code search)": github
    "Filesystem (scoped file access)": filesystem
    "Fetch (HTTP fetch for docs/APIs)": fetch
    "Playwright (browser automation)": playwright
    "Postgres (read-only DB introspection)": postgres
    "Context7 (up-to-date library docs lookup)": context7
  default:
    - github
    - filesystem
    - context7

include_github_workflows:
  type: bool
  help: |
    Add a starter GitHub Actions workflow at .github/workflows/ci.yml?
    It runs lint + test for every language you selected on push and PR.
    Pick "no" if this project won't live on GitHub or you don't want CI yet.
  default: true

include_vscode:
  type: bool
  help: "Include shared .vscode/ editor settings + extension recommendations?"
  default: true

# Computed вҖ” not asked. The agent workspace folder name.
# - Claude canonical -> .claude/ (matches Claude Code's native folder)
# - Cursor canonical -> .cursor/ (matches Cursor's native folder)
# - Everything else  -> .ai/    (generic, agent-agnostic)
ai_folder:
  type: str
  when: false
  default: "{% if ai_agent == 'claude' and agent_file_style == 'canonical' %}.claude{% elif ai_agent == 'cursor' and agent_file_style == 'canonical' %}.cursor{% else %}.ai{% endif %}"
